
services:

  app:
    build: .
    container_name: event_app
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - PYTHONUNBUFFERED=1

  mongo:
    image: mongo:7
    container_name: event_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: