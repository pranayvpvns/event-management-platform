<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 bg-white p-4 shadow-sm rounded border">
                
                <div class="mb-4">
                    <a href="/events" class="text-decoration-none text-secondary">← Back to Events</a>
                    <h2 class="mt-2">Register for Event</h2>
                </div>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Select Participant</label>
                        <select name="participant_id" class="form-select" required>
                            <option value="" disabled selected>Choose a participant...</option>
                            {% for p in participants %}
                            <option value="{{p.id}}">
                                {{p.name}}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Event</label>
                        <select name="event_id" class="form-select" required>
                            <option value="" disabled selected>Choose an event...</option>
                            {% for e in events %}
                            <option value="{{e.id}}">
                                {{e.title}}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            Register Now
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
