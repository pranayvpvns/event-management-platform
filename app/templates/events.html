<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

    <div class="container bg-white p-4 shadow-sm rounded border">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Events</h2>
            <div>
                <a href="/events/add" class="btn btn-primary btn-sm">Create Event</a>
                <a href="/register" class="btn btn-outline-secondary btn-sm ms-2">Register Participant</a>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle border">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Capacity</th>
                        <th>Trainer</th>
                        <th>Participants</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for e in events %}
                    <tr>
                        <td><span class="badge bg-secondary">{{e.id}}</span></td>
                        <td class="fw-bold">{{e.title}}</td>
                        <td>{{e.capacity}}</td>
                        <td>
                            {% if e.trainer %}
                                <span class="text-dark">{{e.trainer.name}}</span>
                            {% else %}
                                <span class="text-muted italic">No Trainer</span>
                            {% endif %}
                        </td>
                        <td>
                            <a href="/event/{{e.id}}/participants" class="btn btn-info btn-sm text-white">
                                View Participants
                            </a>
                        </td>
                        <td>
                            <a href="/events/delete/{{e.id}}" class="btn btn-danger btn-sm" 
                               onclick="return confirm('Are you sure?')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
